<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pathfinder Character Sheet</title>
    <script type="module" src="/main.js" defer></script>
  </head>
  <body>
    <div class="pf-sheet">
      <!-- Header Section -->
      <header class="pf-header">
        <div class="header-logo">
          <h1>PATHFINDER</h1>
          <h2>CHARACTER SHEET</h2>
          <div class="toolbar" id="toolbar">
            <button id="btn-save" class="toolbar-btn">💾 Save</button>
            <button id="btn-load" class="toolbar-btn">📂 Load</button>
            <button id="btn-print" class="toolbar-btn">🖨️ Print</button>
          </div>
        </div>
        <div class="header-details">
          <div class="detail-row">
            <div class="field w-2"><label>Character Name</label><input type="text" id="char-name"></div>
            <div class="field w-1"><label>Alignment</label><input type="text" id="char-alignment"></div>
            <div class="field w-1"><label>Player</label><input type="text" id="char-player"></div>
          </div>
          <div class="detail-row">
            <div class="field w-2"><label>Character Class & Level</label><input type="text" id="char-class" readonly></div>
            <div class="field w-1"><label>Deity</label><input type="text" id="char-deity"></div>
            <div class="field w-1"><label>Homeland</label><input type="text" id="char-homeland"></div>
          </div>
          <div class="detail-row">
            <div class="field w-1"><label>Race</label><input type="text" id="char-race"></div>
            <div class="field w-1"><label>Size</label><input type="text" id="char-size"></div>
            <div class="field w-1"><label>Gender</label><input type="text" id="char-gender"></div>
            <div class="field w-1"><label>Age</label><input type="text" id="char-age"></div>
          </div>
          <div class="detail-row">
            <div class="field w-1"><label>Height</label><input type="text" id="char-height"></div>
            <div class="field w-1"><label>Weight</label><input type="text" id="char-weight"></div>
            <div class="field w-1"><label>Hair</label><input type="text" id="char-hair"></div>
            <div class="field w-1"><label>Eyes</label><input type="text" id="char-eyes"></div>
          </div>
        </div>
      </header>

      <!-- Classes Section -->
      <div class="pf-section classes-section" style="margin-bottom: 20px;">
        <div class="section-header" style="display: flex; justify-content: space-between;">
          <span>CLASSES</span>
          <button id="add-class-btn" class="roll-btn" style="color: white; font-size: 10px;">+ ADD CLASS</button>
        </div>
        <div class="classes-grid">
          <div class="class-row-header">
            <div style="text-align: left; padding-left: 5px;">Class Type</div>
            <div style="text-align: left; padding-left: 5px;">Class Name</div>
            <div>Level</div><div>BAB</div><div>Fort</div><div>Ref</div><div>Will</div><div></div>
          </div>
          <div id="classes-container">
            <!-- Dynamic classes go here -->
          </div>
        </div>
      </div>

      <!-- Main Body: Two Columns -->
      <div class="pf-body">
        
        <!-- LEFT COLUMN -->
        <div class="column-left">
          
          <!-- Abilities -->
          <div class="pf-section abilities-section">
            <div class="section-header">ABILITIES</div>
            <div class="abilities-grid">
              <div class="row-header">
                <div></div><div>Base</div><div>Bonus</div><div>Score</div><div>Mod</div>
              </div>
              <!-- STR -->
              <div class="ability-row">
                <button class="roll-btn">STR</button>
                <input type="number" id="str-base" value="10">
                <input type="number" id="str-bonus" value="0">
                <input type="number" id="str-score" readonly value="10">
                <input type="number" class="mod-display" id="str-mod" readonly value="0">
              </div>
              <!-- DEX -->
              <div class="ability-row">
                <button class="roll-btn">DEX</button>
                <input type="number" id="dex-base" value="10">
                <input type="number" id="dex-bonus" value="0">
                <input type="number" id="dex-score" readonly value="10">
                <input type="number" class="mod-display" id="dex-mod" readonly value="0">
              </div>
              <!-- CON -->
              <div class="ability-row">
                <button class="roll-btn">CON</button>
                <input type="number" id="con-base" value="10">
                <input type="number" id="con-bonus" value="0">
                <input type="number" id="con-score" readonly value="10">
                <input type="number" class="mod-display" id="con-mod" readonly value="0">
              </div>
              <!-- INT -->
              <div class="ability-row">
                <button class="roll-btn">INT</button>
                <input type="number" id="int-base" value="10">
                <input type="number" id="int-bonus" value="0">
                <input type="number" id="int-score" readonly value="10">
                <input type="number" class="mod-display" id="int-mod" readonly value="0">
              </div>
              <!-- WIS -->
              <div class="ability-row">
                <button class="roll-btn">WIS</button>
                <input type="number" id="wis-base" value="10">
                <input type="number" id="wis-bonus" value="0">
                <input type="number" id="wis-score" readonly value="10">
                <input type="number" class="mod-display" id="wis-mod" readonly value="0">
              </div>
              <!-- CHA -->
              <div class="ability-row">
                <button class="roll-btn">CHA</button>
                <input type="number" id="cha-base" value="10">
                <input type="number" id="cha-bonus" value="0">
                <input type="number" id="cha-score" readonly value="10">
                <input type="number" class="mod-display" id="cha-mod" readonly value="0">
              </div>
            </div>
          </div>

          <!-- HP Section -->
          <div class="pf-section hp-section">
            <div class="section-header">HP</div>
            <div class="hp-grid">
              <div class="hp-box"><label>Total</label><input type="number" id="hp-total" value="10"></div>
              <div class="hp-box current"><label>Current HP</label><input type="number" id="hp-current" value="10"></div>
              <div class="hp-box nonlethal"><label>Nonlethal</label><input type="number" id="hp-nonlethal" value="0"></div>
            </div>
          </div>

        </div>

        <!-- RIGHT COLUMN -->
        <div class="column-right">
          
          <!-- Initiative -->
          <div class="pf-section init-section">
            <div class="section-header">INITIATIVE</div>
            <div class="calc-row">
              <div class="total-box">
                <label>Total</label>
                <input type="number" id="init-total" readonly value="0">
              </div>
              <span class="math-sym">=</span>
              <div class="calc-box">
                <label>Dex</label>
                <input type="number" id="init-dex" readonly value="0">
              </div>
              <span class="math-sym">+</span>
              <div class="calc-box">
                <label>Misc</label>
                <input type="number" id="init-misc" value="0">
              </div>
            </div>
          </div>

          <!-- Armor Class -->
          <div class="pf-section ac-section">
            <div class="section-header">ARMOR CLASS</div>
            <div class="calc-row">
              <div class="total-box">
                <label>AC</label>
                <input type="number" id="ac-total" readonly value="10">
              </div>
              <span class="math-sym">=</span>
              <div class="calc-box">
                <label>Base</label>
                <span class="static-val">10</span>
              </div>
              <span class="math-sym">+</span>
              <div class="calc-box">
                <label>Armor</label>
                <input type="number" id="ac-armor" value="0">
              </div>
              <span class="math-sym">+</span>
              <div class="calc-box">
                <label>Shield</label>
                <input type="number" id="ac-shield" value="0">
              </div>
              <span class="math-sym">+</span>
              <div class="calc-box">
                <label>Dex</label>
                <input type="number" id="ac-dex" readonly value="0">
              </div>
              <span class="math-sym">+</span>
              <div class="calc-box">
                <label>Size</label>
                <input type="number" id="ac-size" value="0">
              </div>
            </div>
            <!-- Secondary AC -->
            <div class="calc-row second-ac-row">
              <span class="math-sym">+</span>
              <div class="calc-box">
                <label>Nat.</label>
                <input type="number" id="ac-nat" value="0">
              </div>
              <span class="math-sym">+</span>
              <div class="calc-box">
                <label>Defl.</label>
                <input type="number" id="ac-defl" value="0">
              </div>
              <span class="math-sym">+</span>
              <div class="calc-box">
                <label>Misc</label>
                <input type="number" id="ac-misc" value="0">
              </div>
              <div class="spacer"></div>
              <div class="total-box">
                <label>Touch</label>
                <input type="number" id="ac-touch" readonly value="10">
              </div>
              <div class="total-box">
                <label>Flat</label>
                <input type="number" id="ac-flat" readonly value="10">
              </div>
            </div>
          </div>

          <!-- Saving Throws -->
          <div class="pf-section saves-section">
            <div class="section-header">SAVING THROWS</div>
            <div class="saves-grid">
              <div class="row-header">
                <div></div><div>Total</div><div>Base</div><div>Ability</div><div>Magic</div><div>Misc</div><div>Temp</div>
              </div>
              <!-- Fortitude -->
              <div class="save-row">
                <button class="roll-btn">FORT (CON)</button>
                <input type="number" class="total-box-input" id="fort-total" readonly value="0">
                <input type="number" id="fort-base" readonly value="0">
                <input type="number" id="fort-ability" readonly value="0"> <!-- CON -->
                <input type="number" id="fort-magic" value="0">
                <input type="number" id="fort-misc" value="0">
                <input type="number" id="fort-temp" value="">
              </div>
              <!-- Reflex -->
              <div class="save-row">
                <button class="roll-btn">REF (DEX)</button>
                <input type="number" class="total-box-input" id="ref-total" readonly value="0">
                <input type="number" id="ref-base" readonly value="0">
                <input type="number" id="ref-ability" readonly value="0"> <!-- DEX -->
                <input type="number" id="ref-magic" value="0">
                <input type="number" id="ref-misc" value="0">
                <input type="number" id="ref-temp" value="">
              </div>
              <!-- Will -->
              <div class="save-row">
                <button class="roll-btn">WILL (WIS)</button>
                <input type="number" class="total-box-input" id="will-total" readonly value="0">
                <input type="number" id="will-base" readonly value="0">
                <input type="number" id="will-ability" readonly value="0"> <!-- WIS -->
                <input type="number" id="will-magic" value="0">
                <input type="number" id="will-misc" value="0">
                <input type="number" id="will-temp" value="">
              </div>
            </div>
          </div>

          <!-- Base Attack / CMB / CMD -->
          <div class="pf-section bab-section">
             <div class="section-header">ATTACK / MANEUVER</div>
             <div class="calc-row">
              <div class="total-box">
                <label>BAB</label>
                <input type="number" id="bab" readonly value="0">
              </div>
             </div>
             
             <div class="calc-row">
              <div class="total-box">
                <label>CMB</label>
                <input type="number" id="cmb-total" readonly value="0">
              </div>
              <span class="math-sym">=</span>
              <div class="calc-box">
                <label>BAB</label>
                <input type="number" id="cmb-bab" readonly value="0">
              </div>
              <span class="math-sym">+</span>
              <div class="calc-box">
                <label>Str</label>
                <input type="number" id="cmb-str" readonly value="0">
              </div>
              <span class="math-sym">+</span>
              <div class="calc-box">
                <label>Size</label>
                <input type="number" id="cmb-size" value="0">
              </div>
            </div>

            <div class="calc-row">
              <div class="total-box">
                <label>CMD</label>
                <input type="number" id="cmd-total" readonly value="10">
              </div>
              <span class="math-sym">=</span>
              <div class="calc-box">
                <label>Base</label>
                <span class="static-val">10</span>
              </div>
              <span class="math-sym">+</span>
              <div class="calc-box">
                <label>BAB</label>
                <input type="number" id="cmd-bab" readonly value="0">
              </div>
              <span class="math-sym">+</span>
              <div class="calc-box">
                <label>Str</label>
                <input type="number" id="cmd-str" readonly value="0">
              </div>
              <span class="math-sym">+</span>
              <div class="calc-box">
                <label>Dex</label>
                <input type="number" id="cmd-dex" readonly value="0">
              </div>
              <span class="math-sym">+</span>
              <div class="calc-box">
                <label>Size</label>
                <input type="number" id="cmd-size" value="0">
              </div>
            </div>

          </div>

        </div>
      </div>
    </div>
  </body>
</html>
